<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Restaurant Finder</title>
  
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold mb-6">Restaurant Finder</h1>

    <div class="flex gap-3 mb-6">
      <input
        id="cityInput"
        type="text"
        placeholder="Enter a city..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-red-400"
      />
      <button
        onclick="search()"
        class="px-6 py-2 bg-red-500 text-white rounded-lg text-base hover:bg-red-600"
      >
        Search
      </button>
    </div>

    <div id="error" class="text-red-500 mb-4"></div>
    <div id="results"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
